name: Deploy frontend

# Frontend deploys to Cloudflare Pages directly from this workflow.
# We don't use Pages' native git integration because the upstream repo isn't
# owned by the deploying CF account, so we can't connect it there.
#
# Skips worker-only changes to avoid wasted CI runs.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=endline-events --branch=main
