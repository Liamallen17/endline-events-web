name: Deploy worker

# Frontend deploys are handled by Cloudflare Pages' native git integration
# on the same repo. This workflow only deploys the Cloudflare Worker.
#
# D1 migrations are deliberately NOT run here — they need a human eye.
# Run `cd worker && npm run db:migrate:remote` from your laptop when you
# add a new migration.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  — token with Workers Scripts:Edit, D1:Edit, and
#                           edit access to the endlineevents.com zone (for the route)
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account id

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm ci
      - run: npm run typecheck

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
